services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
        # user: "1000:1000"
    ports:
      - "8001:8001"
    volumes:
      - ./storage/reports:/reports
      - ./storage/logs:/logs
    environment:
      PYTHONPATH: /app/apps/api
      REPORT_OUTPUT_DIR: /reports
      LOGS_DIR: /logs
      RUNTIME_ACCOUNT_STATE_PATH: /logs/runtime/accounts/simulated_account_state.json
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    env_file:
      - ./apps/api/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
        # user: "1000:1000"
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
